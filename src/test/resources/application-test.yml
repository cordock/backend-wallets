spring:
  datasource:
    hikari:
      maximum-pool-size: 50

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off